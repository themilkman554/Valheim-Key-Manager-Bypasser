<!DOCTYPE html>
<html>
<head>
    <title>Valheim Key Manager Bypasser</title>
    <style>
        body { 
            background: #111; 
            color: #eee; 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 60px; 
        }
        input { 
            margin: 20px; 
            padding: 10px; 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        #status { 
            margin-top: 15px; 
            font-weight: bold; 
        }
        .example {
            color: #888;
            font-size: 0.9em;
            margin-top: 8px;
        }
        .source-link {
            color: #4db8ff;
            text-decoration: underline;
            font-size: 0.9em;
            margin-top: 6px;
            display: inline-block;
        }
        .source-link:hover {
            color: #7ac6ff;
        }
    </style>
</head>
<body>
    <h2>Valheim Key Manager Bypasser</h2>
    <input type="file" id="f" accept=".dll">
    
    <div id="status">Upload the DLL of the Key Manager mod</div>
    <div class="example">DRM patcher for mostly low quailty mods.  Should allow you to use the mod on linux dedicated servers or whatever other restrictions imposed by Key Manager.</div>
    <a href="https://github.com/themilkman554/Valheim-Key-Manager-Bypasser/blob/main/index.html" target="_blank" class="source-link">Source</a>

    <script>
        function h(x) { 
            return x.match(/.{1,2}/g).map(v => parseInt(v, 16)); 
        }

        function fnd(buf, p) {
            for (let i = 0; i <= buf.length - p.length; i++) {
                let m = 1;
                for (let j = 0; j < p.length; j++) {
                    if (buf[i + j] != p[j]) { m = 0; break; }
                }
                if (m) return i;
            }
            return -1;
        }

        document.getElementById("f").onchange = e => {
            const file = e.target.files[0];
            const status = document.getElementById("status");
            if (!file) return;

            status.innerText = "Processing...";

            let r = new FileReader();
            r.onload = x => {
                let u = new Uint8Array(x.target.result);
                let p = h("012B01160D092C0820E54959C8252B06");
                let i = fnd(u, p);

                if (i == -1) {
                    status.innerText = "Pattern not found/Mod may not have Key Manager";
                    status.style.color = "#ff4d4d";
                    return;
                }


                u[i + 6] = 0x2D;
                status.innerText = "Success! Patching complete. Starting download...";
                status.style.color = "#4dff88";


                let a = document.createElement("a");
                a.href = URL.createObjectURL(new Blob([u]));
                a.download = "patched_" + file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            r.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
